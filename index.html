<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Locales</title>
    <!-- Modern Typography: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <h2>Mis Finanzas</h2>
            </div>
            
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Dashboard</span>
                </a>
            </nav>

            <div class="sidebar-bottom">
                <div class="user-info">
                    <p>Almacenamiento Local</p>
                    <small>Seguro y privado</small>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="month-selector">
                    <button id="prevMonthBtn" class="icon-btn"><i class="fa-solid fa-chevron-left"></i></button>
                    <h1 id="currentMonthDisplay">Enero 2026</h1>
                    <button id="nextMonthBtn" class="icon-btn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="header-actions">
                    <button id="addTransactionBtn" class="btn primary-btn">
                        <i class="fa-solid fa-plus"></i> Nueva Transacción
                    </button>
                </div>
            </header>

            <section class="dashboard-widgets">
                <!-- Balance -->
                <div class="widget balance-widget">
                    <div class="widget-icon">
                        <i class="fa-solid fa-scale-balanced"></i>
                    </div>
                    <div class="widget-details">
                        <h3>Balance Total</h3>
                        <p class="amount" id="balanceAmount">0,00 €</p>
                    </div>
                </div>

                <!-- Income -->
                <div class="widget income-widget">
                    <div class="widget-icon">
                        <i class="fa-solid fa-arrow-up"></i>
                    </div>
                    <div class="widget-details">
                        <h3>Ingresos</h3>
                        <p class="amount positive" id="incomeAmount">0,00 €</p>
                    </div>
                </div>

                <!-- Expenses -->
                <div class="widget expense-widget">
                    <div class="widget-icon">
                        <i class="fa-solid fa-arrow-down"></i>
                    </div>
                    <div class="widget-details">
                        <h3>Gastos</h3>
                        <p class="amount negative" id="expenseAmount">0,00 €</p>
                    </div>
                </div>
            </section>

            <section class="transactions-section">
                <div class="section-header">
                    <h2>Transacciones del Mes</h2>
                </div>
                
                <div class="transactions-list" id="transactionsList">
                    <!-- Transactions will be rendered here dynamically -->
                    <div class="empty-state">
                        <i class="fa-regular fa-folder-open"></i>
                        <p>No hay transacciones este mes.</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for adding transactions -->
    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cargar Transacción</h2>
                <button id="closeModalBtn" class="icon-btn close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="transactionForm">
                <div class="form-group type-selector">
                    <label class="radio-label">
                        <input type="radio" name="type" value="expense" checked>
                        <span class="radio-custom expense"><i class="fa-solid fa-arrow-down"></i> Gasto</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="type" value="income">
                        <span class="radio-custom income"><i class="fa-solid fa-arrow-up"></i> Ingreso</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="amount">Importe (€)</label>
                    <input type="number" id="amount" step="0.01" min="0" required placeholder="0.00">
                </div>

                <div class="form-group">
                    <label for="category">Categoría</label>
                    <select id="category" required>
                        <option value="" disabled selected>Selecciona una categoría...</option>
                        <option value="housing">Vivienda</option>
                        <option value="food">Alimentación</option>
                        <option value="transport">Transporte</option>
                        <option value="leisure">Ocio</option>
                        <option value="salary">Sueldo / Nómina</option>
                        <option value="others">Otros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Fecha</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <label for="description">Descripción</label>
                    <input type="text" id="description" required placeholder="Ej: Compra supermercado">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn primary-btn full-width">Guardar Transacción</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
